name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened] # PR作成/再オープン時のみ(コスト抑制: 毎pushでは実行しない)

permissions:
  contents: read
  pull-requests: write # レビューコメント投稿に必要
  issues: read
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # 公式の code-review スキルが差分取得〜インラインコメント投稿まで実施
          # --comment: 指摘をPRのインラインコメントとして投稿する
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment"
          # gh api での書き込み(コメント投稿)を許可する
          settings: |
            {
              "permissions": {
                "allow": ["Bash(gh api:*)", "Bash(gh pr:*)"]
              }
            }
          claude_args: |
            --model claude-sonnet-4-6
