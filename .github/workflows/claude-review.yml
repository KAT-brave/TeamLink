name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize] # PR作成時 + PRブランチへのpush時

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # レビューコメント投稿に必要
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true # デバッグ用(動作確認後に削除可)
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 15
          prompt: |
            # PRレビュー

            このPRで変更されたファイルを確認し、以下の観点でレビューを実施してください。

            重要: 指摘は必ず `mcp__github_inline_comment__create_inline_comment`
            ツールを呼び出して、該当ファイル/行へのインラインコメントとして投稿すること。
            テキストで出力するだけでは投稿されません。指摘が1件も無い場合のみ、
            何も投稿しなくて構いません。

            ## レビュー手順

            ### ステップ1: 変更ファイルの理解
            - 変更の意図（新機能、バグ修正、リファクタリング等）
            - 影響範囲
            - PRの説明との整合性

            ### ステップ2: レビュー実施

            #### プロトタイプ（prototype/**）の変更がある場合
            - [ ] HTMLの構造が適切か（セマンティックなタグの使用）
            - [ ] CSSの記述が整理されているか
            - [ ] JavaScriptにセキュリティ上の問題がないか（XSS等）
            - [ ] console.logがデバッグ用途で残っていないか
            - [ ] アクセシビリティの基本対応がされているか

            #### ドキュメント（docs/**、*.md）の変更がある場合
            - [ ] ドキュメント間の整合性が取れているか
            - [ ] Markdownフォーマットが正しいか
            - [ ] 内容が正確か
            - [ ] リンク切れがないか

            #### ワークフロー（.github/**）の変更がある場合
            - [ ] YAML構文が正しいか
            - [ ] パーミッション設定が最小権限の原則に従っているか
            - [ ] シークレットの取り扱いが適切か

            ### ステップ3: レビュー結果の出力

            各指摘はインラインコメントとして該当行に投稿し、重要度（重要/軽微）を
            日本語で明記してください。
            **問題なしと判断した項目はコメントしないでください。**
