name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize] # PR作成時 + PRブランチへのpush時

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # レビューコメント投稿に必要
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true # レビュー結果をPRコメントとして自動投稿する
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 15
          prompt: |
            # PRレビュー

            このPRで変更されたファイルを確認し、以下の観点でレビューを実施してください。
            指摘は `mcp__github_inline_comment__create_inline_comment` ツールを使い、
            該当ファイル/行に対するインラインコメントとして投稿してください。
            全体の総括は進捗コメントに記載してください。

            ## レビュー手順

            ### ステップ1: 過去のレビュー確認（重複指摘の防止）
            1. このPRの過去のレビューコメントを確認
            2. 対応済みの項目は再指摘しない
            3. 新規変更または未対応の項目のみをレビュー対象とする

            ### ステップ2: 変更ファイルの理解
            - 変更の意図（新機能、バグ修正、リファクタリング等）
            - 影響範囲
            - PRの説明との整合性

            ### ステップ3: レビュー実施

            #### プロトタイプ（prototype/**）の変更がある場合
            - [ ] HTMLの構造が適切か（セマンティックなタグの使用）
            - [ ] CSSの記述が整理されているか
            - [ ] JavaScriptにセキュリティ上の問題がないか（XSS等）
            - [ ] console.logがデバッグ用途で残っていないか
            - [ ] アクセシビリティの基本対応がされているか

            #### ドキュメント（docs/**、*.md）の変更がある場合
            - [ ] ドキュメント間の整合性が取れているか
            - [ ] Markdownフォーマットが正しいか
            - [ ] 内容が正確か
            - [ ] リンク切れがないか

            #### ワークフロー（.github/**）の変更がある場合
            - [ ] YAML構文が正しいか
            - [ ] パーミッション設定が最小権限の原則に従っているか
            - [ ] シークレットの取り扱いが適切か

            ### ステップ4: レビュー結果の出力

            指摘は該当ファイル/行を示し、重要度（重要/軽微）を付けて日本語の
            コメントとして投稿してください。
            **問題なしと判断した項目は出力しないでください。**
